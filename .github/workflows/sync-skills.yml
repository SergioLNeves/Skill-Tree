name: Sync skills

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Validate required variables
        run: |
          if [[ -z "${{ vars.SKILLS_REPO }}" ]]; then
            echo "::error title=SKILLS_REPO not configured::Set SKILLS_REPO in Settings → Secrets and variables → Actions → Variables (format: owner/repo)"
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm sync-skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKILLS_REPO: ${{ vars.SKILLS_REPO }}
          SKILLS_BRANCH: ${{ vars.SKILLS_BRANCH || 'main' }}
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain src/data/skills.json src/data/skills/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/skills.json src/data/skills/
            git commit -m "chore: sync skills data"
            git push
          else
            echo "No changes, skipping commit."
          fi
